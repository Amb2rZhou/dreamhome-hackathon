<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>DreamHome · 家的灵感摘抄本</title>
  <meta name="theme-color" content="#f2efe9">
  <meta name="description" content="从家居视频/照片/手绘「摘抄」家具，AI 生成 3D 组件，摆进你的 3D 房间。">

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="./icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DreamHome">

  <link rel="stylesheet" href="./css/app.css">

  <!-- 坑1：importmap 必须在页面第一个 module script 之前，否则被忽略 -->
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three.module.js",
      "three/addons/": "./vendor/"
    }
  }
  </script>
</head>
<body>
  <!-- 顶栏 -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">🏠</span>
      <span class="brand-name">DreamHome</span>
      <span class="brand-sub">家的灵感摘抄本</span>
    </div>
    <div id="keyState" class="key-state" title="fal key 状态"></div>
  </header>

  <!-- 视图容器：各 tab 渲染于此 -->
  <main id="view" class="view"></main>

  <!-- 底部 5 tab -->
  <nav class="tabbar" id="tabbar">
    <button class="tab" data-tab="image"><span class="tab-ico">🖼️</span><span class="tab-label">图生3D</span></button>
    <button class="tab" data-tab="photo"><span class="tab-ico">📷</span><span class="tab-label">拍照</span></button>
    <button class="tab" data-tab="sketch"><span class="tab-ico">✏️</span><span class="tab-label">画画</span></button>
    <button class="tab" data-tab="library"><span class="tab-ico">📦</span><span class="tab-label">组件库</span></button>
    <button class="tab" data-tab="room"><span class="tab-ico">🛋️</span><span class="tab-label">3D空间</span></button>
  </nav>

  <!-- 过程动画 overlay 挂载点 -->
  <div id="progressRoot"></div>
  <!-- toast 挂载点 -->
  <div id="toastRoot" class="toast-root"></div>

  <!-- model-viewer：固定 3.5.0（坑3：latest 是坏的调试版）。自托管。 -->
  <script type="module" src="./vendor/model-viewer-3.5.0.min.js"></script>
  <!-- 应用入口 -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
