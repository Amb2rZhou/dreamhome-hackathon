<!doctype html>

<head>

  <title>DreamHome · 刷一刷</title>
  <link rel="stylesheet" href="./dreamhome-d-system.css" />
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: linear-gradient(90deg, #e7eee5, #f6faf4 48%, #e3ece1); font-family: var(--dh-font-sans); }
    .dh-screen { display: flex; flex-direction: column; }
    .toolbar { height: 70px; padding: 14px 16px 0; display:flex; align-items:center; justify-content:space-between; }
    .back { width:38px; height:38px; display:grid; place-items:center; border-radius:50%; background:var(--dh-bg-surface); color:var(--dh-fg-primary); text-decoration:none; box-shadow:var(--dh-shadow-soft); font-size:20px; }
    .title { font-size:20px; font-weight:var(--dh-font-weight-heavy); letter-spacing:var(--dh-tracking-title); }
    .feed { flex:1; margin:0 16px 16px; border-radius:var(--dh-radius-2xl); border:1px dashed rgba(112,136,111,.36); background:rgba(255,255,255,.48); display:grid; place-items:center; color:var(--dh-fg-muted); text-align:center; padding:24px; }
    .feed b { display:block; margin-bottom:7px; color:var(--dh-fg-primary); font-size:16px; }
    .feed span { font-size:12px; line-height:1.5; }
  </style>
</head>

  <main class="dh-phone-shell"><section class="dh-screen dh-root">
    <header class="toolbar"><a class="back" href="../main-interface-v1/index.html" aria-label="返回主界面">‹</a><strong class="title">刷一刷</strong><span style="width:38px"></span></header>

  </section></main>
