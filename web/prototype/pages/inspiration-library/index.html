<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5fbf6" />
  <title>DreamHome · 灵感库</title>
  <link rel="stylesheet" href="./dreamhome-d-system.css" />
  <link rel="stylesheet" href="../shared/tabbar.css" />
  <style>
    body { margin:0; min-height:100vh; background:linear-gradient(90deg,#faf4e6,#fefdf8 48%,#f8f2e3); color:var(--dh-fg-primary); font-family:var(--dh-font-sans); }
    .preview-stage { min-height:100vh; display:grid; place-items:center; padding:28px 18px; box-sizing:border-box; }
    .library-shell { position:relative; }.library-app { height:calc(100% - 50px); padding:0 16px; display:flex; flex-direction:column; box-sizing:border-box; overflow:hidden; }
    .status-icons { display:flex; align-items:center; gap:5px; height:17px; transform:translateY(-6px); }.status-time { font-size:15px; font-weight:var(--dh-font-weight-bold); transform:translateY(-3px); }.bars { display:flex; gap:2px; align-items:end; height:13px; }.bars i { width:3px; border-radius:2px; background:currentColor; }.bars i:nth-child(1){height:6px}.bars i:nth-child(2){height:9px}.bars i:nth-child(3){height:12px}.bat { width:23px;height:12px;border:1.5px solid currentColor;border-radius:3px;position:relative; }.bat::before{content:"";position:absolute;inset:2px;width:13px;background:currentColor;border-radius:1px}.bat::after{content:"";position:absolute;right:-4px;top:3px;width:2px;height:4px;background:currentColor;border-radius:2px}
    .library-header { display:grid; place-items:center; min-height:42px; padding-top:3px; }.library-header[hidden]{display:none}.library-header.is-catalog{display:block;place-items:unset;padding:2px 0 7px}.library-title{margin:0;font-size:16px;letter-spacing:0;font-weight:var(--dh-font-weight-heavy)}
    /* 主页面顶栏白栏：状态栏 + 标题栏统一为底部导航同色；次级页（全部/查看全部）由 JS 移除 dh-topwhite 保持原透明 */
    .dh-screen.dh-topwhite .dh-statusbar { background: var(--dh-bg-surface); }
    .dh-screen.dh-topwhite .library-header { background: var(--dh-bg-surface); margin:0 -16px; padding-left:16px; padding-right:16px; box-shadow:0 2px 6px rgba(175,135,65,.06); }
    .library-content { flex:1; min-height:0; overflow-y:auto; overscroll-behavior:contain; padding:14px 0 var(--dh-tabbar-safe-space); scrollbar-width:none; }.library-content::-webkit-scrollbar{display:none}.catalog-view[hidden],.library-home[hidden]{display:none!important}
    /* 顶部 banner 轮播 */
    .library-banner{margin:0 0 16px}.library-banner[hidden]{display:none}
    .hero-viewport{overflow:hidden;border-radius:14px;box-shadow:0 5px 14px rgba(69,89,67,.09);touch-action:pan-y;user-select:none}
    .hero-track{display:flex;transition:transform .32s cubic-bezier(.32,.72,0,1);will-change:transform}
    .hero-slide{flex:0 0 100%;height:138px;box-sizing:border-box;position:relative;overflow:hidden}
    .hero-slide--mood{display:flex;align-items:center;justify-content:flex-end;padding:0 8px;background:#fdf6e8 url(../../assets/banners/mood.jpg) center/cover no-repeat}
    .hero-mascot{height:94px;width:auto;object-fit:contain;flex:none;pointer-events:none}
    .hero-bubble{position:absolute;left:14px;top:50%;transform:translateY(-50%);max-width:none;padding:8px 11px;border-radius:14px;background:rgba(255,255,255,.95);box-shadow:0 4px 12px rgba(69,89,67,.16);color:var(--dh-fg-primary);font-size:12px;font-weight:var(--dh-font-weight-bold);line-height:1.4}
    .hero-bubble::after{content:"";position:absolute;right:-8px;top:50%;transform:translateY(-50%);width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent;border-left:9px solid rgba(255,255,255,.95)}.hero-bubble .bl{display:block;white-space:nowrap;letter-spacing:.01em}.hero-bubble .bl + .bl{margin-top:3px}

    .hero-dots{display:flex;justify-content:center;gap:6px;margin-top:8px}.hero-dots i{width:6px;height:6px;border-radius:50%;background:rgba(93,115,91,.28);transition:.2s ease}.hero-dots i.is-active{width:16px;border-radius:3px;background:var(--dh-color-sage-600)}
    .viewer-actions{margin-top:10px;display:flex;align-items:center;justify-content:center;gap:10px}

    .viewer-fav .vf-heart{font-size:13px;line-height:1}
    .viewer-fav[aria-pressed="true"]{background:#be6959;color:#fff;border-color:#be6959}
    .viewer-source{width:32px;height:32px;padding:0;border:1px solid rgba(110,132,107,.3);border-radius:50%;background:#fff;color:var(--dh-color-sage-700);display:inline-grid;place-items:center;cursor:pointer}.viewer-source svg{width:16px;height:16px}.viewer-source[hidden]{display:none}

    .confirm-actions{display:flex;gap:10px}.confirm-actions button{flex:1;min-height:42px;border:0;border-radius:13px;font:inherit;font-size:13px;font-weight:var(--dh-font-weight-bold);cursor:pointer}.confirm-cancel{background:rgba(250,241,220,.9);color:var(--dh-fg-secondary)}.confirm-ok{background:#be6959;color:#fff;box-shadow:0 8px 18px rgba(150,70,55,.3)}

    .viewer-photo{position:absolute;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 42% 34%,#fbfdf9,#f4ecdb 70%,#dbe6d4)}.viewer-photo img{width:100%;height:100%;object-fit:contain}.viewer-photo-note{position:absolute;left:50%;bottom:9px;transform:translateX(-50%);padding:4px 10px;border-radius:999px;background:rgba(29,36,31,.55);color:#fff;font-size:9px;font-weight:var(--dh-font-weight-semibold);pointer-events:none}
    .catalog-section { margin-bottom:16px; padding:11px 10px 12px; border:1px solid rgba(117,139,113,.18); border-radius:14px; background:rgba(255,255,255,.9); box-shadow:0 5px 14px rgba(69,89,67,.07); }.section-head { display:flex; align-items:center; justify-content:space-between; min-height:27px; margin-bottom:8px; }.section-tag { width:max-content; padding:5px 7px; border-radius:7px; background:var(--dh-color-sage-100); color:var(--dh-color-sage-800); font-size:11px; font-weight:var(--dh-font-weight-heavy); letter-spacing:0; }.all-button,.catalog-back { border:0; padding:4px 0; background:transparent; color:var(--dh-color-sage-700); font:inherit; font-size:11px; font-weight:var(--dh-font-weight-heavy); cursor:pointer; }
    .component-rail { display:flex; flex-wrap:nowrap; gap:9px; overflow-x:auto; overscroll-behavior-x:contain; margin:0 -2px; padding:3px 3px 7px; scrollbar-width:none; }.component-rail::-webkit-scrollbar{display:none}.component-card,.furniture-card { position:relative; }.component-card { flex:0 0 79px; min-width:0; border:0; padding:0; background:transparent; color:inherit; text-align:left; cursor:pointer; }.component-card--floorplan b{font-size:9px}.component-visual { position:relative; height:72px; overflow:hidden; border:var(--dh-card-border); border-radius:8px; background:#f7efe0; box-shadow:var(--dh-shadow-soft); }.component-card b{display:block;overflow:hidden;margin:6px 1px 0;font-size:10px;letter-spacing:0;text-overflow:ellipsis;white-space:nowrap}.favorite-control{position:absolute;z-index:3;right:4px;top:4px;width:21px;height:21px;padding:0;border:0;border-radius:50%;background:rgba(255,255,255,.87);color:var(--dh-color-sage-600);font-size:12px;line-height:1;cursor:pointer;box-shadow:0 2px 5px rgba(44,59,45,.13)}.favorite-control[aria-pressed="true"]{color:#be6959;background:#fff4ef}.source-badge{position:absolute;z-index:2;left:4px;top:4px;max-width:calc(100% - 34px);overflow:hidden;padding:3px 5px;border-radius:999px;background:rgba(65,78,64,.82);color:#fff;font-size:8px;font-weight:var(--dh-font-weight-bold);line-height:1;letter-spacing:.01em;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
    .visual--floorplan{background:linear-gradient(135deg,#f7ecd5,#fffdf6)}.visual--floorplan canvas{display:block;width:100%;height:100%;background-size:cover;background-position:center;background-repeat:no-repeat}
    .furniture-tabs { display:flex; gap:6px; overflow-x:auto; margin:0 -2px; padding:1px 3px 9px; scrollbar-width:none; }.furniture-tabs::-webkit-scrollbar{display:none}.furniture-tab{flex:0 0 auto;border:1px solid rgba(110,132,107,.2);border-radius:999px;padding:5px 9px;background:rgba(255,255,255,.62);color:var(--dh-fg-secondary);font:inherit;font-size:10px;font-weight:var(--dh-font-weight-bold);cursor:pointer}.furniture-tab[aria-selected="true"]{border-color:var(--dh-color-sage-600);background:var(--dh-color-sage-600);color:white}
    .furniture-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:9px 7px; }.furniture-card{min-width:0;border:0;padding:0;background:transparent;color:inherit;text-align:left;cursor:pointer}.furniture-card .component-visual{height:62px}.furniture-card b{display:block;margin:5px 1px 0;overflow:hidden;font-size:9px;font-weight:var(--dh-font-weight-bold);text-overflow:ellipsis;white-space:nowrap}.visual--furniture{background:linear-gradient(145deg,#f7efe0,#fffaf2)}.object{position:absolute;left:50%;bottom:9px;transform:translateX(-50%);background:var(--object);box-shadow:inset 0 8px rgba(255,255,255,.18)}.object--sofa{width:47px;height:22px;border-radius:12px 12px 5px 5px}.object--sofa::before{content:"";position:absolute;left:9px;top:-12px;width:29px;height:16px;border-radius:9px 9px 3px 3px;background:var(--accent)}.object--chair{width:25px;height:23px;border-radius:7px 7px 4px 4px}.object--chair::before{content:"";position:absolute;left:4px;top:-14px;width:17px;height:18px;border-radius:7px 7px 2px 2px;background:var(--accent)}.object--table{width:42px;height:15px;border-radius:50%;bottom:18px}.object--table::before{content:"";position:absolute;left:19px;top:12px;width:4px;height:20px;background:var(--accent)}.object--lamp{width:4px;height:36px;border-radius:2px;bottom:9px}.object--lamp::before{content:"";position:absolute;left:-10px;top:-10px;width:24px;height:13px;border-radius:50% 50% 3px 3px;background:var(--accent)}.object--bed{width:46px;height:25px;border-radius:5px}.object--bed::before{content:"";position:absolute;left:5px;top:4px;width:35px;height:10px;border-radius:4px;background:var(--accent)}.object--cabinet{width:39px;height:29px;border-radius:3px}.object--plant{width:22px;height:23px;border-radius:45% 55% 38% 62%;background:var(--accent)}.object--plant::before{content:"";position:absolute;left:-7px;top:-8px;width:15px;height:22px;border-radius:50% 0 50% 0;background:var(--object)}.all-card{display:grid;place-items:center;height:62px;align-self:start;border:1px dashed rgba(150,112,58,.5)!important;border-radius:8px!important;background:rgba(245,236,215,.52)!important;color:var(--dh-color-sage-800)!important;font-size:10px;font-weight:var(--dh-font-weight-heavy);text-align:center}.all-card span{max-width:46px}
    .catalog-toolbar{display:grid;grid-template-columns:64px 1fr 64px;align-items:center}.catalog-toolbar h2{margin:0;font-size:16px;font-weight:var(--dh-font-weight-heavy);text-align:center;white-space:nowrap}.catalog-toolbar .catalog-back{justify-self:start;font-size:30px;line-height:1;padding:0 10px 0 2px;margin:-4px 0;color:var(--dh-color-sage-700)}.catalog-manage{justify-self:end;white-space:nowrap;border:1px solid rgba(110,132,107,.32);border-radius:999px;padding:5px 13px;background:rgba(255,255,255,.82);color:var(--dh-color-sage-700);font:inherit;font-size:11px;font-weight:var(--dh-font-weight-heavy);cursor:pointer}.catalog-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px 8px}.catalog-grid .component-card{min-width:0}.catalog-grid .component-visual{height:86px}.empty-state{padding:24px 10px;text-align:center;color:var(--dh-fg-secondary);font-size:12px}.toast{position:absolute;z-index:40;left:50%;bottom:78px;transform:translateX(-50%) translateY(8px);opacity:0;padding:9px 12px;border-radius:999px;background:rgba(29,36,31,.9);color:white;font-size:11px;font-weight:var(--dh-font-weight-semibold);pointer-events:none;transition:.2s ease}.toast.show{opacity:1;transform:translateX(-50%)}
    /* 选择模式：勾选框 + 平台资产禁用 */
    .component-card[data-selectable]{cursor:pointer}.select-check{position:absolute;z-index:4;right:4px;top:4px;width:20px;height:20px;border:2px solid #fff;border-radius:50%;background:rgba(29,36,31,.35);box-shadow:0 1px 4px rgba(44,59,45,.3);display:grid;place-items:center;color:#fff;font-size:12px;line-height:1}.component-card[data-selected="true"] .select-check{background:var(--dh-color-sage-600)}.component-card--locked{opacity:.4}.selecting .favorite-control{display:none}
    .select-bar{position:absolute;z-index:45;left:16px;right:16px;bottom:26px;display:flex;gap:10px}.select-bar[hidden]{display:none}.select-bar button{flex:1;height:42px;border-radius:13px;font:inherit;font-size:13px;font-weight:var(--dh-font-weight-bold);cursor:pointer}.select-cancel{border:1px solid rgba(110,132,107,.32);background:rgba(255,255,255,.94);color:var(--dh-fg-secondary)}.select-confirm{border:0;background:#be6959;color:#fff;box-shadow:0 8px 18px rgba(150,70,55,.3)}.select-confirm[disabled]{opacity:.45;box-shadow:none;cursor:not-allowed}
    #mainTabbar[hidden]{display:none}
    /* 查看弹窗 */
    .viewer{position:absolute;inset:0;z-index:60;display:flex;align-items:center;justify-content:center}.viewer[hidden]{display:none}.viewer-backdrop{position:absolute;inset:0;background:rgba(20,26,21,.5);opacity:0;transition:opacity .22s ease}.viewer.is-open .viewer-backdrop{opacity:1}
    .viewer-card{position:relative;width:calc(100% - 44px);max-width:288px;padding:14px;border-radius:24px;background:#fff;box-shadow:0 18px 40px rgba(29,36,31,.3);transform:scale(.94);opacity:0;transition:transform .22s cubic-bezier(.32,.72,0,1),opacity .22s ease}.viewer.is-open .viewer-card{transform:scale(1);opacity:1}
    .viewer-close{position:absolute;z-index:2;right:12px;top:12px;width:28px;height:28px;border:0;border-radius:50%;background:rgba(240,240,238,.9);color:var(--dh-fg-secondary);font-size:13px;cursor:pointer}

    .viewer-foot{margin-top:12px;text-align:center}.viewer-name{width:100%;box-sizing:border-box;padding:2px 6px;border:0;border-radius:9px;background:transparent;color:var(--dh-fg-primary);font:inherit;font-size:17px;font-weight:var(--dh-font-weight-heavy);letter-spacing:var(--dh-tracking-title);text-align:center}.viewer-name:not([readonly]):focus{background:rgba(246,250,244,.95);outline:1.5px solid rgba(110,132,107,.4)}

    .sheet{position:absolute;inset:0;z-index:58;display:flex;align-items:flex-end}.sheet[hidden]{display:none}.sheet-backdrop{position:absolute;inset:0;background:rgba(20,26,21,.42);opacity:0;transition:opacity .22s ease}.sheet.is-open .sheet-backdrop{opacity:1}

  </style>
</head>
<body>
  <main class="preview-stage">
    <section class="dh-phone-shell library-shell" aria-label="DreamHome 平台灵感库">
      <div class="dh-screen dh-root dh-topwhite">
        <div class="dh-island" aria-hidden="true"></div>
        <div class="dh-statusbar"><span class="status-time">9:41</span><div class="status-icons" aria-hidden="true"><div class="bars"><i></i><i></i><i></i></div><span>5G</span><div class="bat"></div></div></div>
        <div class="library-app">
          <header class="library-header" id="libraryHeader"><h1 class="library-title">灵感库</h1></header>
          <main class="library-content">
            <div class="library-banner" id="libraryBanner"></div>
            <div class="library-home" id="libraryHome"></div>
            <section class="catalog-view" id="catalogView" hidden aria-live="polite"></section>

      viewer3D = { dispose() {
        cancelAnimationFrame(raf); controls.dispose();
        scene.traverse((o) => { if (o.isMesh) { o.geometry?.dispose(); const m = o.material; Array.isArray(m) ? m.forEach((x) => x?.dispose()) : m?.dispose(); } });
        renderer.dispose(); renderer.forceContextLoss(); renderer.domElement.remove();
      } };
      // 相机按包围球取景：不同长宽比资产都刚好框住、居中，替代方形照片的压缩/截断
      const frameObject = (obj) => {
        const box = new THREE.Box3().setFromObject(obj);
        obj.position.sub(box.getCenter(new THREE.Vector3())); // 居中到原点
        const r = box.getBoundingSphere(new THREE.Sphere()).radius || 1;
        const dist = (r / Math.sin(THREE.MathUtils.degToRad(camera.fov / 2))) * 1.15;
        camera.position.set(dist * 0.6, dist * 0.42, dist * 0.78);
        camera.near = Math.max(0.01, dist - r * 2); camera.far = dist + r * 4; camera.updateProjectionMatrix();
        controls.target.set(0, 0, 0); controls.update();
      };
      // 平台真实资产：载入压缩 GLB（Draco）；失败则 resolve(false) 让上层切回照片
      if (asset.modelUrl) {
        const { GLTFLoader } = await import('three/addons/loaders/GLTFLoader.js');
        const { DRACOLoader } = await import('three/addons/loaders/DRACOLoader.js');
        const draco = new DRACOLoader(); draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/libs/draco/');
        const loader = new GLTFLoader(); loader.setDRACOLoader(draco);
        return new Promise((resolve) => {
          loader.load(asset.modelUrl, (gltf) => {
            if (!viewer3D) return resolve(true); // 已关闭
            scene.add(gltf.scene); frameObject(gltf.scene); tick(); resolve(true);
          }, undefined, () => resolve(false));
        });
      }
      // 用户生成家具：primitive 占位几何
      const group = buildFurniture(THREE, asset);
      new THREE.Box3().setFromObject(group).getCenter(group.position).multiplyScalar(-1);
      group.position.y += 0.02; scene.add(group);
      tick();
      return true;
    }
    // 家具几何：移植自 my-home createAssetGroup，按 primitive/color/accent 拼装
    function buildFurniture(THREE, asset) {
      const group = new THREE.Group();
      const mat = (c) => new THREE.MeshStandardMaterial({ color: c, roughness: 0.72 });
      const wood = mat(asset.accent || '#a27b5b'); const dark = mat('#59645b');
      const box = (w, h, d, x, y, z, m = wood) => { const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), m); mesh.position.set(x, y, z); group.add(mesh); };
      const cyl = (r1, r2, h, x, y, z, m = wood) => { const mesh = new THREE.Mesh(new THREE.CylinderGeometry(r1, r2, h, 18), m); mesh.position.set(x, y, z); group.add(mesh); };
      const p = asset.primitive || '';
      if (p === 'chair') { box(.72, .16, .68, 0, .52, 0); box(.7, .72, .15, 0, .93, .26, mat(asset.color || '#d7a98b')); [-.27, .27].forEach((x) => [-.22, .22].forEach((z) => box(.07, .5, .07, x, .25, z, dark))); }
      else if (p === 'sofa') { box(1.6, .28, .72, 0, .48, 0); box(1.55, .6, .18, 0, .83, .27, mat(asset.color || '#d7a98b')); box(.18, .5, .7, -.71, .68, 0, mat(asset.color || '#c18b78')); box(.18, .5, .7, .71, .68, 0, mat(asset.color || '#c18b78')); }
      else if (p === 'lamp') { cyl(.24, .3, .07, 0, .04, 0, dark); cyl(.035, .035, 1.1, 0, .58, 0, dark); cyl(.31, .2, .32, 0, 1.28, 0, mat(asset.color || '#efd981')); }
      else if (p === 'cabinet') { box(.95, 1.28, .32, 0, .64, 0, wood); [-.37, 0, .37].forEach((y) => box(.82, .05, .35, 0, y + .28, 0, dark)); }
      else if (p === 'table') { cyl(.6, .6, .09, 0, .64, 0, wood); [-.36, .36].forEach((x) => [-.36, .36].forEach((z) => box(.08, .58, .08, x, .29, z, dark))); }
      else if (p === 'bed') { box(1.35, .3, 1.7, 0, .32, 0, wood); box(1.28, .17, 1.45, 0, .56, -.08, mat(asset.color || '#e2ddd0')); box(1.35, .48, .12, 0, .55, .78, dark); }
      else { cyl(.22, .3, .32, 0, .16, 0, mat('#af8061')); [-.2, 0, .2].forEach((x, i) => { const leaf = new THREE.Mesh(new THREE.SphereGeometry(.22, 12, 8), mat(i === 1 ? '#6f916b' : '#86a87d')); leaf.scale.set(.65, 1.45, .4); leaf.position.set(x, .65 + (i % 2) * .16, 0); leaf.rotation.z = x * 1.5; group.add(leaf); }); }
      return group;
    }
    // 让名称输入框贴合文字宽度（含中文），🔗 随名字长度自由跟随
    const fitViewerName = () => {
      const cs = getComputedStyle(viewerName);
      const probe = document.createElement('span');
      probe.style.cssText = `position:absolute;visibility:hidden;white-space:pre;font-family:${cs.fontFamily};font-size:${cs.fontSize};font-weight:${cs.fontWeight};letter-spacing:${cs.letterSpacing}`;
      probe.textContent = viewerName.value || ' ';
      document.body.appendChild(probe);
      viewerName.style.width = `${Math.min(180, Math.max(22, probe.offsetWidth + 12))}px`;
      probe.remove();
    };
    function openViewer(id) {
      const asset = getAsset(id);
      if (!asset) return;
      viewerAssetId = id;
      const editable = isUser(asset);
      const use3D = (isUser(asset) && asset.kind === 'furniture') || !!asset.modelUrl; // 用户生成→primitive 占位；平台真实资产→真实 GLB
      viewerName.value = asset.name;
      viewerName.readOnly = !editable;
      viewerDelete.hidden = !editable;
      viewerSource.hidden = editable || asset.sourceType === 'offline_photo' || !asset.videoUrl; // 拍照资产没有虚构的视频跳转
      syncViewerFav();
      fitViewerName();
      const catLabel = asset.category ? FURNITURE_CATEGORIES.find((c) => c.id === asset.category)?.label || '' : '';
      const provenance = asset.sourceType === 'offline_photo' ? '线下拍照生成' : (editable ? '我的组件' : '平台组件');
      viewerMeta.textContent = `${labelByKind[asset.kind]}${catLabel ? ` · ${catLabel}` : ''} · ${provenance}`;
      viewer.hidden = false;
      disposeTemplatePreviews(viewerStage);
      const showPhoto = () => {
        if (asset.thumbnail) viewerStage.innerHTML = `<div class="viewer-photo"><img src="${asset.thumbnail}" alt="${asset.name}" /></div>`;
        else viewerStage.innerHTML = visual(asset);
      };
      if (asset.kind === 'floorplan' && asset.templateId) {
        viewerStage.innerHTML = `<div class="component-visual visual--floorplan"><canvas data-template-preview="${asset.templateId}" aria-label="${asset.name} 3D 户型预览"></canvas></div>`;
        requestAnimationFrame(() => { viewer.classList.add('is-open'); renderTemplatePreview(viewerStage.querySelector('canvas'), asset.templateId); });
      } else if (use3D) {
        viewerStage.innerHTML = '<span class="viewer-hint">拖动可 360° 查看</span>';
        requestAnimationFrame(async () => {
          viewer.classList.add('is-open');
          const ok = await open3DViewer(asset);
          if (!ok && viewerAssetId === id) { viewer3D?.dispose(); viewer3D = null; showPhoto(); } // GLB 失败兜底照片
        });
      } else if (asset.thumbnail) {
        viewerStage.innerHTML = `<div class="viewer-photo"><img src="${asset.thumbnail}" alt="${asset.name}" /><span class="viewer-photo-note">3D 预览由后端提供</span></div>`;
        requestAnimationFrame(() => viewer.classList.add('is-open'));
      } else {
        viewerStage.innerHTML = visual(asset);
        requestAnimationFrame(() => viewer.classList.add('is-open'));
      }
    }
    function closeViewer() {
      viewer.classList.remove('is-open');
      disposeTemplatePreviews(viewerStage);
      viewer3D?.dispose(); viewer3D = null; viewerAssetId = null;
      setTimeout(() => { viewer.hidden = true; }, 220);
    }
    viewerName.addEventListener('change', () => {
      const asset = getAsset(viewerAssetId); if (!asset || !isUser(asset)) return;
      asset.name = viewerName.value.trim() || asset.name; viewerName.value = asset.name;
      addUserAsset(asset); showToast('组件名称已更新'); rerender();
    });
    viewerName.addEventListener('input', fitViewerName);
    // 收藏（所有组件都可收藏）
    const syncViewerFav = () => { const on = viewerAssetId && getFavorites().has(viewerAssetId); viewerFav.setAttribute('aria-pressed', on ? 'true' : 'false'); viewerFav.querySelector('.vf-heart').textContent = on ? '♥' : '♡'; viewerFav.querySelector('.vf-text').textContent = on ? '已收藏' : '收藏'; };
    viewerFav.addEventListener('click', () => { if (!viewerAssetId) return; toggle(viewerAssetId); syncViewerFav(); });
    // 删除（仅用户组件）→ 先弹「删除后不可恢复」二次确认
    viewerDelete.addEventListener('click', () => { if (!viewerAssetId) return; openDelConfirm({ type: 'single', id: viewerAssetId }); });
    viewerSource.addEventListener('click', () => {
      const asset = getAsset(viewerAssetId); if (!asset?.videoUrl) return;
      const target = new URLSearchParams({ asset:viewerAssetId, video:asset.videoId || '' });
      if (asset.videoSec != null && Number.isFinite(Number(asset.videoSec))) target.set('t', String(asset.videoSec));
      location.href = `../discover/index.html#${target}`;
    }); // 仅视频资产跳「刷一刷」准确来源

    // ---------- 删除二次确认弹窗 ----------
    const delConfirm = document.getElementById('delConfirm');
    const delConfirmOk = document.getElementById('delConfirmOk');
    const delConfirmText = document.getElementById('delConfirmText');
    let pendingDelete = null;
    function openDelConfirm(payload) {
      pendingDelete = payload;
      const count = payload.type === 'batch' ? payload.ids.length : 1;
      delConfirmText.textContent = count > 1 ? `将删除 ${count} 个组件，删除后不可恢复。` : '删除后不可恢复。';
      delConfirm.hidden = false; requestAnimationFrame(() => delConfirm.classList.add('is-open'));
    }
    function closeDelConfirm() { delConfirm.classList.remove('is-open'); pendingDelete = null; setTimeout(() => { delConfirm.hidden = true; }, 200); }
    delConfirmOk.addEventListener('click', () => {
      if (!pendingDelete) return;
      if (pendingDelete.type === 'single') { removeUserAsset(pendingDelete.id); closeDelConfirm(); closeViewer(); showToast('已删除该组件'); rerender(); }
      else { const n = pendingDelete.ids.length; pendingDelete.ids.forEach((id) => removeUserAsset(id)); closeDelConfirm(); exitSelect(true); renderCatalog(); showToast(`已删除 ${n} 个组件`); }
    });

    // ---------- 管理浮层 ----------
    const manageSheet = document.getElementById('manageSheet');
    const sheetBody = document.getElementById('sheetBody');
    const ENTRIES = [
      { label: '去拍一张', emoji: '📷', href: '../capture/index.html' },
      { label: '去刷一刷', emoji: '☝️', href: '../discover/index.html' },
    ];
    function renderSheet(kind) {
      if (kind === 'add') {
        sheetBody.innerHTML = `<div class="sheet-head"><button class="sheet-back" id="sheetBack" aria-label="返回">‹</button><b>新增组件</b><button class="sheet-close" data-sheet-close aria-label="关闭">✕</button></div>`
          + ENTRIES.map((e) => `<a class="sheet-row" href="${e.href}"><span>${e.emoji}</span><b>${e.label}</b><span class="arrow">›</span></a>`).join('');
      } else {
        sheetBody.innerHTML = `<div class="sheet-head"><span class="sheet-spacer" aria-hidden="true"></span><b>管理</b><button class="sheet-close" data-sheet-close aria-label="关闭">✕</button></div>`
          + `<button class="sheet-row" id="sheetAdd">新增<span class="arrow">›</span></button>`
          + `<button class="sheet-row" id="sheetDelete">删除<span class="arrow">›</span></button>`;
      }
    }
    function openSheet(kind) { renderSheet(kind); manageSheet.hidden = false; requestAnimationFrame(() => manageSheet.classList.add('is-open')); }
    function closeSheet() { manageSheet.classList.remove('is-open'); setTimeout(() => { manageSheet.hidden = true; }, 240); }

    // ---------- 删除选择模式 ----------
    function enterSelect() { select.on = true; select.ids.clear(); renderCatalog(); }
    function exitSelect(silent = false) { select.on = false; select.ids.clear(); selectBar.hidden = true; if (!silent) renderCatalog(); }
    const selectBar = document.getElementById('selectBar');
    const confirmDelete = document.getElementById('confirmDelete');
    confirmDelete.addEventListener('click', () => {
      if (!select.ids.size) return;
      openDelConfirm({ type: 'batch', ids: [...select.ids] });
    });

    // ---------- 事件委托（单监听器） ----------
    document.addEventListener('click', (event) => {
      // 弹窗 / 浮层关闭
      if (event.target.closest('[data-del-cancel]')) { closeDelConfirm(); return; }
      if (event.target.closest('#viewerClose') || event.target.closest('[data-viewer-close]')) { closeViewer(); return; }
      if (event.target.closest('[data-sheet-close]')) { closeSheet(); return; }
      if (event.target.closest('#sheetBack')) { renderSheet('main'); return; }
      if (event.target.closest('#sheetAdd')) { renderSheet('add'); return; }
      if (event.target.closest('#sheetDelete')) { closeSheet(); enterSelect(); return; }
      if (event.target.closest('#manageOpen')) { openSheet('main'); return; }
      if (event.target.closest('#selectCancel')) { exitSelect(); return; }
      // 选择模式：点卡片切换选中
      if (select.on) {
        const selectable = event.target.closest('[data-selectable]');
        if (selectable) { const id = selectable.dataset.asset; select.ids.has(id) ? select.ids.delete(id) : select.ids.add(id); renderCatalog(); return; }
        if (event.target.closest('.component-card--locked')) { showToast('平台组件库内容，暂不支持删除'); }
        return;
      }
      const favorite = event.target.closest('[data-favorite]');
      if (favorite) { event.stopPropagation(); toggle(favorite.dataset.favorite); return; }
      const all = event.target.closest('[data-all]');
      if (all) { const [kind, category] = all.dataset.all.split(':'); openCatalog(kind, category); return; }
      const tab = event.target.closest('[data-category]');
      if (tab) { activeFurnitureCategory = tab.dataset.category; renderHome(); return; }
      if (event.target.closest('#catalogBack')) { const fromMyHome = new URLSearchParams(location.search).get('from') === 'myhome'; if (fromMyHome && view.kind === 'floorplan' && !view.favoriteOnly) { location.href = '../my-home/index.html'; return; } if (location.hash) location.hash = ''; else route(); return; } // 唯一例外：从「我的家」进来的户型全部页返回我的家；其余回灵感库主页
      const caseSlide = event.target.closest('[data-case]');
      if (caseSlide) { if (bannerDragged) { bannerDragged = false; return; } const videoId = caseSlide.dataset.video; if (videoId) location.href = `../my-home/index.html?case=${encodeURIComponent(videoId)}`; return; } // 跳「我的家」案例只读模式（复用拼装编辑器）
      const asset = event.target.closest('[data-asset]');
      if (asset) openViewer(asset.dataset.asset);
    });
    window.addEventListener('hashchange', route);
    renderBanner();
    route();
  </script>
</body>
</html>
