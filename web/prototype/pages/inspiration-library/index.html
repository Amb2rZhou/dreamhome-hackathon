<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5fbf6" />
  <title>DreamHome · 灵感库</title>
  <link rel="stylesheet" href="./dreamhome-d-system.css" />
  <link rel="stylesheet" href="../shared/five-tabbar.css" />
  <style>
    body { margin:0; min-height:100vh; background:linear-gradient(90deg,#e7eee5,#f6faf4 48%,#e3ece1); color:var(--dh-fg-primary); font-family:var(--dh-font-sans); }
    .preview-stage { min-height:100vh; display:grid; place-items:center; padding:28px 18px; box-sizing:border-box; }
    .library-shell { position:relative; }.library-app { height:calc(100% - 50px); padding:0 16px; display:flex; flex-direction:column; box-sizing:border-box; overflow:hidden; }
    .status-icons { display:flex; align-items:center; gap:5px; height:17px; transform:translateY(-6px); }.status-time { font-size:15px; font-weight:var(--dh-font-weight-bold); transform:translateY(-3px); }.bars { display:flex; gap:2px; align-items:end; height:13px; }.bars i { width:3px; border-radius:2px; background:currentColor; }.bars i:nth-child(1){height:6px}.bars i:nth-child(2){height:9px}.bars i:nth-child(3){height:12px}.bat { width:23px;height:12px;border:1.5px solid currentColor;border-radius:3px;position:relative; }.bat::before{content:"";position:absolute;inset:2px;width:13px;background:currentColor;border-radius:1px}.bat::after{content:"";position:absolute;right:-4px;top:3px;width:2px;height:4px;background:currentColor;border-radius:2px}
    .library-header { display:grid; place-items:center; min-height:42px; padding-top:3px; }.library-title{margin:0;font-size:16px;letter-spacing:0;font-weight:var(--dh-font-weight-heavy)}
    .library-content { flex:1; min-height:0; overflow-y:auto; overscroll-behavior:contain; padding:14px 0 var(--dh-tabbar-safe-space); scrollbar-width:none; }.library-content::-webkit-scrollbar{display:none}.catalog-view[hidden],.library-home[hidden]{display:none!important}
    .catalog-section { margin-bottom:16px; padding:11px 10px 12px; border:1px solid rgba(117,139,113,.18); border-radius:14px; background:rgba(255,255,255,.9); box-shadow:0 5px 14px rgba(69,89,67,.07); }.section-head { display:flex; align-items:center; justify-content:space-between; min-height:27px; margin-bottom:8px; }.section-tag { width:max-content; padding:5px 7px; border-radius:7px; background:var(--dh-color-sage-100); color:var(--dh-color-sage-800); font-size:11px; font-weight:var(--dh-font-weight-heavy); letter-spacing:0; }.all-button,.catalog-back { border:0; padding:4px 0; background:transparent; color:var(--dh-color-sage-700); font:inherit; font-size:11px; font-weight:var(--dh-font-weight-heavy); cursor:pointer; }
    .component-rail { display:flex; flex-wrap:nowrap; gap:9px; overflow-x:auto; overscroll-behavior-x:contain; margin:0 -2px; padding:3px 3px 7px; scrollbar-width:none; }.component-rail::-webkit-scrollbar{display:none}.component-card,.furniture-card { position:relative; }.component-card { flex:0 0 79px; min-width:0; border:0; padding:0; background:transparent; color:inherit; text-align:left; cursor:pointer; }.component-card--floorplan b{font-size:9px}.component-visual { position:relative; height:72px; overflow:hidden; border:var(--dh-card-border); border-radius:8px; background:#edf2eb; box-shadow:var(--dh-shadow-soft); }.component-card b{display:block;overflow:hidden;margin:6px 1px 0;font-size:10px;letter-spacing:0;text-overflow:ellipsis;white-space:nowrap}.favorite-control{position:absolute;z-index:3;right:4px;top:4px;width:21px;height:21px;padding:0;border:0;border-radius:50%;background:rgba(255,255,255,.87);color:var(--dh-color-sage-600);font-size:12px;line-height:1;cursor:pointer;box-shadow:0 2px 5px rgba(44,59,45,.13)}.favorite-control[aria-pressed="true"]{color:#be6959;background:#fff4ef}
    .visual--floorplan{background:linear-gradient(135deg,#e3ecdf,#fbfaf2)}.visual--floorplan::before,.visual--floorplan::after{content:"";position:absolute;border:2px solid rgba(85,108,83,.52)}.visual--floorplan::before{inset:12px 14px}.visual--floorplan::after{left:37px;top:12px;bottom:12px;border-width:0 0 0 2px}.visual--floor{background:linear-gradient(130deg,var(--swatch),var(--accent))}.visual--floor.pattern-grain{background:repeating-linear-gradient(12deg,var(--swatch) 0 10px,var(--accent) 11px 12px)}.visual--floor.pattern-speckle{background:radial-gradient(circle at 20% 30%,var(--accent) 0 2px,transparent 2.5px),radial-gradient(circle at 75% 70%,var(--accent) 0 1.5px,transparent 2px),var(--swatch);background-size:18px 17px}.visual--floor.pattern-parquet{background:repeating-linear-gradient(45deg,var(--swatch) 0 9px,var(--accent) 10px 11px)}.visual--floor.pattern-stone{background:linear-gradient(120deg,var(--swatch) 46%,var(--accent) 47% 49%,var(--swatch) 50%)}.visual--wallpaper{background:var(--swatch)}.visual--wallpaper.pattern-linen{background:repeating-linear-gradient(90deg,var(--swatch) 0 4px,var(--accent) 5px 6px)}.visual--wallpaper.pattern-leaf{background:radial-gradient(ellipse at 25% 30%,var(--accent) 0 7px,transparent 8px),radial-gradient(ellipse at 70% 60%,var(--accent) 0 8px,transparent 9px),var(--swatch)}.visual--wallpaper.pattern-grid{background:linear-gradient(var(--accent) 1px,transparent 1px),linear-gradient(90deg,var(--accent) 1px,transparent 1px),var(--swatch);background-size:11px 11px}.visual--wallpaper.pattern-woven{background:repeating-linear-gradient(45deg,var(--swatch) 0 4px,var(--accent) 5px 6px)}
    .furniture-tabs { display:flex; gap:6px; overflow-x:auto; margin:0 -2px; padding:1px 3px 9px; scrollbar-width:none; }.furniture-tabs::-webkit-scrollbar{display:none}.furniture-tab{flex:0 0 auto;border:1px solid rgba(110,132,107,.2);border-radius:999px;padding:5px 9px;background:rgba(255,255,255,.62);color:var(--dh-fg-secondary);font:inherit;font-size:10px;font-weight:var(--dh-font-weight-bold);cursor:pointer}.furniture-tab[aria-selected="true"]{border-color:var(--dh-color-sage-600);background:var(--dh-color-sage-600);color:white}
    .furniture-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:9px 7px; }.furniture-card{min-width:0;border:0;padding:0;background:transparent;color:inherit;text-align:left;cursor:pointer}.furniture-card .component-visual{height:62px}.furniture-card b{display:block;margin:5px 1px 0;overflow:hidden;font-size:9px;font-weight:var(--dh-font-weight-bold);text-overflow:ellipsis;white-space:nowrap}.visual--furniture{background:linear-gradient(145deg,#edf2e9,#fffaf2)}.object{position:absolute;left:50%;bottom:9px;transform:translateX(-50%);background:var(--object);box-shadow:inset 0 8px rgba(255,255,255,.18)}.object--sofa{width:47px;height:22px;border-radius:12px 12px 5px 5px}.object--sofa::before{content:"";position:absolute;left:9px;top:-12px;width:29px;height:16px;border-radius:9px 9px 3px 3px;background:var(--accent)}.object--chair{width:25px;height:23px;border-radius:7px 7px 4px 4px}.object--chair::before{content:"";position:absolute;left:4px;top:-14px;width:17px;height:18px;border-radius:7px 7px 2px 2px;background:var(--accent)}.object--table{width:42px;height:15px;border-radius:50%;bottom:18px}.object--table::before{content:"";position:absolute;left:19px;top:12px;width:4px;height:20px;background:var(--accent)}.object--lamp{width:4px;height:36px;border-radius:2px;bottom:9px}.object--lamp::before{content:"";position:absolute;left:-10px;top:-10px;width:24px;height:13px;border-radius:50% 50% 3px 3px;background:var(--accent)}.object--bed{width:46px;height:25px;border-radius:5px}.object--bed::before{content:"";position:absolute;left:5px;top:4px;width:35px;height:10px;border-radius:4px;background:var(--accent)}.object--cabinet{width:39px;height:29px;border-radius:3px}.object--plant{width:22px;height:23px;border-radius:45% 55% 38% 62%;background:var(--accent)}.object--plant::before{content:"";position:absolute;left:-7px;top:-8px;width:15px;height:22px;border-radius:50% 0 50% 0;background:var(--object)}.all-card{display:grid;place-items:center;border:1px dashed rgba(96,119,94,.55)!important;border-radius:8px!important;background:rgba(224,235,220,.52)!important;color:var(--dh-color-sage-800)!important;font-size:10px;font-weight:var(--dh-font-weight-heavy);text-align:center}.all-card span{max-width:46px}
    .catalog-toolbar{display:flex;align-items:center;gap:10px;margin:0 0 13px}.catalog-toolbar h2{margin:0;font-size:15px}.catalog-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px 8px}.catalog-grid .component-card{min-width:0}.catalog-grid .component-visual{height:86px}.empty-state{padding:24px 10px;text-align:center;color:var(--dh-fg-secondary);font-size:12px}.toast{position:absolute;z-index:40;left:50%;bottom:78px;transform:translateX(-50%) translateY(8px);opacity:0;padding:9px 12px;border-radius:999px;background:rgba(29,36,31,.9);color:white;font-size:11px;font-weight:var(--dh-font-weight-semibold);pointer-events:none;transition:.2s ease}.toast.show{opacity:1;transform:translateX(-50%)}
    @media(max-width:420px){.preview-stage{min-height:100svh;padding:18px 10px}.library-app{padding:0 14px}.furniture-grid{gap:8px 6px}}
  </style>
</head>
<body>
  <main class="preview-stage">
    <section class="dh-phone-shell library-shell" aria-label="DreamHome 平台灵感库">
      <div class="dh-screen dh-root">
        <div class="dh-island" aria-hidden="true"></div>
        <div class="dh-statusbar"><span class="status-time">9:41</span><div class="status-icons" aria-hidden="true"><div class="bars"><i></i><i></i><i></i></div><span>5G</span><div class="bat"></div></div></div>
        <div class="library-app">
          <header class="library-header"><h1 class="library-title">灵感库</h1></header>
          <main class="library-content">
            <div class="library-home" id="libraryHome"></div>
            <section class="catalog-view" id="catalogView" hidden aria-live="polite"></section>
          </main>
        </div>
        <nav class="dh-tabbar dh-tabbar--five" aria-label="主功能导航"><a class="dh-tab" href="../draw/index.html" aria-label="画一笔"><span class="dh-tab-icon"><img src="../../assets/icons/navigation/draw.svg" alt="" /></span></a><a class="dh-tab" href="../capture/index.html" aria-label="拍一张"><span class="dh-tab-icon"><img src="../../assets/icons/navigation/capture.svg" alt="" /></span></a><a class="dh-tab dh-tab--core dh-tab--active" href="./index.html" aria-label="灵感库" aria-current="page"><span class="dh-tab-icon"><img src="../../assets/icons/navigation/inspiration.svg" alt="" /></span></a><a class="dh-tab" href="../discover/index.html" aria-label="刷一刷"><span class="dh-tab-icon"><img src="../../assets/icons/navigation/discover.svg" alt="" /></span></a><a class="dh-tab" href="../my-home/index.html" aria-label="我的家"><span class="dh-tab-icon"><img src="../../assets/icons/navigation/my-home.svg" alt="" /></span></a></nav>
        <div class="toast" id="toast" role="status" aria-live="polite"></div><div class="dh-home-indicator" aria-hidden="true"></div>
      </div>
    </section>
  </main>
  <script type="module">
    import { COMPONENT_FAMILIES, FURNITURE_CATEGORIES, getAssets, getFavorites, toggleFavorite } from '../shared/asset-library-data.js';

    const home = document.querySelector('#libraryHome');
    const catalog = document.querySelector('#catalogView');
    const toast = document.querySelector('#toast');
    let activeFurnitureCategory = 'table';
    let pressTimer = null;
    let pressedId = null;
    let toastTimer = null;

    const labelByKind = Object.fromEntries(COMPONENT_FAMILIES.map((family) => [family.id, family.label]));
    const showToast = (message) => { toast.textContent = message; toast.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => toast.classList.remove('show'), 1500); };
    const favoriteButton = (asset) => `<button class="favorite-control" data-favorite="${asset.id}" aria-label="收藏 ${asset.name}" aria-pressed="${getFavorites().has(asset.id)}">${getFavorites().has(asset.id) ? '♥' : '♡'}</button>`;
    const visual = (asset) => {
      if (asset.kind === 'floorplan') return `<div class="component-visual visual--floorplan"></div>`;
      if (asset.kind === 'floor' || asset.kind === 'wallpaper') return `<div class="component-visual visual--${asset.kind} pattern-${asset.finish.pattern}" style="--swatch:${asset.finish.color};--accent:${asset.finish.accent}"></div>`;
      const type = asset.primitive || 'cabinet';
      return `<div class="component-visual visual--furniture" style="--object:${asset.color};--accent:${asset.accent}"><span class="object object--${type}"></span></div>`;
    };
    const card = (asset, className = 'component-card') => `<article class="${className}" data-asset="${asset.id}" tabindex="0">${favoriteButton(asset)}${visual(asset)}<b>${asset.name}</b></article>`;
    const openCatalog = (kind, category = '') => { location.hash = `catalog=${kind}${category ? `:${category}` : ''}`; };
    const renderHome = () => {
      const previousTabs = home.querySelector('.furniture-tabs');
      const previousTabScrollLeft = previousTabs?.scrollLeft || 0;
      const rails = ['floorplan', 'floor', 'wallpaper'].map((kind) => {
        const assets = getAssets(kind).slice(0, 5);
        const cardClass = kind === 'floorplan' ? 'component-card component-card--floorplan' : 'component-card';
        return `<section class="catalog-section"><div class="section-head"><span class="section-tag">${labelByKind[kind]}</span><button class="all-button" data-all="${kind}">全部</button></div><div class="component-rail">${assets.map((asset) => card(asset, cardClass)).join('')}</div></section>`;
      }).join('');
      const furniture = getAssets('furniture', activeFurnitureCategory).slice(0, 11);
      const tabs = FURNITURE_CATEGORIES.map((category) => `<button class="furniture-tab" data-category="${category.id}" role="tab" aria-selected="${category.id === activeFurnitureCategory}">${category.label}</button>`).join('');
      home.innerHTML = `${rails}<section class="catalog-section"><div class="section-head"><span class="section-tag">家具类</span></div><div class="furniture-tabs" role="tablist" aria-label="家具子类">${tabs}</div><div class="furniture-grid">${furniture.map((asset) => card(asset, 'furniture-card')).join('')}<button class="furniture-card all-card" data-all="furniture:${activeFurnitureCategory}" aria-label="查看全部${FURNITURE_CATEGORIES.find((item) => item.id === activeFurnitureCategory).label}"><span>查看全部</span></button></div></section>`;
      const nextTabs = home.querySelector('.furniture-tabs');
      const selectedTab = nextTabs?.querySelector('[aria-selected="true"]');
      if (!nextTabs || !selectedTab) return;
      nextTabs.scrollLeft = previousTabScrollLeft;
      const railRect = nextTabs.getBoundingClientRect();
      const tabRect = selectedTab.getBoundingClientRect();
      if (tabRect.left < railRect.left) nextTabs.scrollLeft += tabRect.left - railRect.left;
      if (tabRect.right > railRect.right) nextTabs.scrollLeft += tabRect.right - railRect.right;
    };
    const renderCatalog = (kind, category, favoriteOnly = false) => {
      let assets = getAssets(kind, category);
      if (favoriteOnly) assets = assets.filter((asset) => getFavorites().has(asset.id));
      const title = favoriteOnly ? '已收藏' : `${labelByKind[kind]}${category ? ` · ${FURNITURE_CATEGORIES.find((item) => item.id === category)?.label || ''}` : ''}`;
      home.hidden = true; catalog.hidden = false;
      catalog.innerHTML = `<div class="catalog-toolbar"><button class="catalog-back" id="catalogBack">‹ 返回</button><h2>${title}</h2></div>${assets.length ? `<div class="catalog-grid">${assets.map(card).join('')}</div>` : '<p class="empty-state">还没有收藏组件。长按卡片或点击心形即可收藏。</p>'}`;
    };
    const route = () => {
      const matched = location.hash.match(/^#catalog=([^:]+)(?::(.+))?$/);
      if (!matched && location.hash !== '#favorites') { home.hidden = false; catalog.hidden = true; renderHome(); return; }
      if (location.hash === '#favorites') { const favorites = getFavorites(); const first = [...favorites][0]; if (!first) { renderCatalog('furniture', '', true); return; } const asset = getAssets().find((item) => item.id === first); renderCatalog(asset.kind, '', true); return; }
      renderCatalog(matched[1], matched[2] || '');
    };
    const toggle = (id) => { const before = getFavorites().has(id); toggleFavorite(id); showToast(before ? '已取消收藏' : '已收藏，可在我的家调用'); route(); };
    document.addEventListener('click', (event) => { const favorite = event.target.closest('[data-favorite]'); if (favorite) { event.stopPropagation(); toggle(favorite.dataset.favorite); return; } const all = event.target.closest('[data-all]'); if (all) { const [kind, category] = all.dataset.all.split(':'); openCatalog(kind, category); return; } const tab = event.target.closest('[data-category]'); if (tab) { activeFurnitureCategory = tab.dataset.category; renderHome(); return; } if (event.target.closest('#catalogBack')) { history.back(); return; } const asset = event.target.closest('[data-asset]'); if (asset) showToast('长按可收藏组件'); });
    document.addEventListener('pointerdown', (event) => { const asset = event.target.closest('[data-asset]'); if (!asset || event.target.closest('[data-favorite]')) return; pressedId = asset.dataset.asset; pressTimer = setTimeout(() => { if (pressedId) { toggle(pressedId); pressedId = null; } }, 600); });
    ['pointerup', 'pointercancel', 'pointermove', 'pointerleave'].forEach((type) => document.addEventListener(type, () => { clearTimeout(pressTimer); pressedId = null; }));
    window.addEventListener('hashchange', route);
    route();
  </script>
</body>
</html>
