<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DreamHome Bao Gong Ball full body mascot">
  <defs>
    <radialGradient id="face" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(69 62) rotate(50) scale(76 72)">
      <stop offset="0" stop-color="#FFFDF7"/>
      <stop offset="0.62" stop-color="#F8E7CD"/>
      <stop offset="1" stop-color="#E8C49A"/>
    </radialGradient>
    <linearGradient id="helmet" x1="42" y1="18" x2="119" y2="62" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE071"/>
      <stop offset="0.55" stop-color="#F6BE32"/>
      <stop offset="1" stop-color="#DD921E"/>
    </linearGradient>
    <linearGradient id="belt" x1="34" y1="100" x2="126" y2="122" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A87543"/>
      <stop offset="1" stop-color="#6B4A31"/>
    </linearGradient>
    <filter id="softShadow" x="18" y="16" width="126" height="136" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#6E604D" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- rolled drawing paper -->
    <g transform="translate(28 48) rotate(-8)">
      <rect x="0" y="4" width="18" height="62" rx="8" fill="#FFF8E8"/>
      <ellipse cx="9" cy="5" rx="9" ry="4.5" fill="#FFFDF5"/>
      <path d="M6 21H13M6 34H13M6 47H12" stroke="#D6C29E" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
    </g>

    <!-- body ball -->
    <circle cx="80" cy="79" r="48" fill="url(#face)"/>

    <!-- helmet -->
    <path d="M35 61C39 34 57 20 80 20C103 20 121 34 125 61C111 55 96 52 80 52C64 52 49 55 35 61Z" fill="url(#helmet)"/>
    <path d="M29 62C43 54 61 49 80 49C99 49 117 54 131 62C130 69 123 72 114 69C91 63 69 63 46 69C37 72 30 69 29 62Z" fill="#FFC83E"/>
    <path d="M79.5 22C72 31 69 40 69 51H91C91 40 87 31 79.5 22Z" fill="#FFE898" opacity="0.9"/>
    <path d="M72 35L80 29L88 35V44H83V38H77V44H72V35Z" stroke="#7C5B27" stroke-width="2.4" stroke-linejoin="round" opacity="0.75"/>
    <path d="M46 59C56 55 68 52 80 52C92 52 104 55 114 59" stroke="#B9781D" stroke-width="2.5" stroke-linecap="round" opacity="0.38"/>

    <!-- side hands -->
    <path d="M33 84C24 88 24 101 32 106C39 111 46 106 46 97" fill="#E8C49B"/>
    <path d="M127 84C136 88 136 101 128 106C121 111 114 106 114 97" fill="#E8C49B"/>

    <!-- face -->
    <circle cx="60" cy="80" r="4.6" fill="#2E2822"/>
    <circle cx="100" cy="80" r="4.6" fill="#2E2822"/>
    <path d="M69 94C75 99 85 99 91 94" stroke="#5B4638" stroke-width="2.8" stroke-linecap="round"/>
    <ellipse cx="48" cy="90" rx="8" ry="4.5" fill="#EFA59D" opacity="0.52"/>
    <ellipse cx="112" cy="90" rx="8" ry="4.5" fill="#EFA59D" opacity="0.52"/>

    <!-- tools behind belt -->
    <path d="M58 96V72" stroke="#3F4C4B" stroke-width="3.6" stroke-linecap="round"/>
    <path d="M53 76L58 70L63 76" stroke="#3F4C4B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M103 96V72" stroke="#3F4C4B" stroke-width="3.6" stroke-linecap="round"/>
    <path d="M98 76L103 70L108 76" stroke="#3F4C4B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M70 100V76" stroke="#E0A02D" stroke-width="4" stroke-linecap="round"/>
    <path d="M70 76L74 84H66L70 76Z" fill="#3D362E"/>
    <path d="M91 100V76" stroke="#E0A02D" stroke-width="4" stroke-linecap="round"/>
    <path d="M91 76L95 84H87L91 76Z" fill="#3D362E"/>

    <!-- belt and pouches -->
    <path d="M34 99C47 108 63 113 80 113C97 113 113 108 126 99C124 112 117 123 105 130C91 138 69 138 55 130C43 123 36 112 34 99Z" fill="url(#belt)"/>
    <rect x="52" y="94" width="15" height="28" rx="6" fill="#B17A4C"/>
    <rect x="68" y="96" width="15" height="28" rx="6" fill="#B17A4C"/>
    <rect x="94" y="96" width="15" height="28" rx="6" fill="#B17A4C"/>
    <rect x="110" y="94" width="15" height="28" rx="6" fill="#B17A4C"/>
    <rect x="72" y="109" width="24" height="17" rx="5" fill="#6B4932"/>
    <rect x="78" y="113" width="12" height="8" rx="2" fill="#EEC46E"/>

    <!-- simple tape measure -->
    <g transform="translate(121 82) rotate(-8)">
      <rect x="0" y="0" width="22" height="30" rx="9" fill="#4F4238"/>
      <circle cx="11" cy="14" r="8" fill="#F0B52B"/>
      <circle cx="11" cy="14" r="3.5" fill="#3A342E"/>
    </g>

    <!-- feet -->
    <ellipse cx="58" cy="132" rx="14" ry="7" fill="#6A4B2F"/>
    <ellipse cx="102" cy="132" rx="14" ry="7" fill="#6A4B2F"/>
  </g>
</svg>
