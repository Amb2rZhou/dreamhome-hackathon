    function selectRoom(id) { sceneRuntime?.focusRoom(id); }
    function rotateSelected(direction) { const placement=state.project.placements.find((item)=>item.id===state.selectedPlacementId); if (!placement) return; placement.rotation.y += direction*Math.PI/12; const group=sceneRuntime.groups.placements.get(placement.id); group.rotation.y=placement.rotation.y; tell('已旋转 15°'); saveSoon(); }
    function scaleSelected(factor) { const placement=state.project.placements.find((item)=>item.id===state.selectedPlacementId); if (!placement) return; if(state.project.source?.type==='video_rebuild'){ const current=placement.scale, next={x:current.x*factor,y:current.y*factor,z:current.z*factor}; placement.scale=next; sceneRuntime.groups.placements.get(placement.id).scale.set(next.x,next.y,next.z); tell(factor>1?'已等比放大':'已等比缩小'); saveSoon(); return; } const base=placement.scale?.x || 1; const next=Math.round(THREE.MathUtils.clamp(base*factor, .5, 2)*100)/100; if (next===base) { tell(factor>1?'已经是最大尺寸':'已经是最小尺寸'); return; } placement.scale={x:next,y:next,z:next}; const group=sceneRuntime.groups.placements.get(placement.id); group.scale.set(next,next,next); tell(`已${factor>1?'放大':'缩小'}至 ${Math.round(next*100)}%`); saveSoon(); }
    function deleteSelected() { const id=state.selectedPlacementId; if (!id) return; const group=sceneRuntime.groups.placements.get(id); sceneRuntime?.clearSelection(true); if (group) { group.parent.remove(group); sceneRuntime.groups.placements.delete(id); sceneRuntime.groups.selectable=sceneRuntime.groups.selectable.filter((item)=>item!==group); } state.project.placements=state.project.placements.filter((item)=>item.id!==id); syncInspector(); tell('组件已移除'); saveSoon(); }
    function exitInteraction() { if (!sceneRuntime) return; if (state.interaction.mode === 'placing') { const ghost=sceneRuntime.root.getObjectByName('placement-ghost'); if (ghost) sceneRuntime.root.remove(ghost); } state.interaction.mode='orbit'; state.interaction.pendingAssetId=null; sceneRuntime.controls.enabled=true; ui.placementHint.classList.remove('is-visible'); tell('已取消当前操作'); }
    // 分享浮层（原型态）：真机走小程序 tt.share / 开放能力——站内=抖音好友转发，站外=系统分享跳转
    function openShareSheet() { ui.shareSheet.hidden=false; requestAnimationFrame(()=>ui.shareSheet.classList.add('is-open')); }
    function closeShareSheet() { ui.shareSheet.classList.remove('is-open'); setTimeout(()=>{ ui.shareSheet.hidden=true; }, 260); }
    // 删除户型 二次确认
    let pendingDeleteId = null;
    function openDeleteConfirm(id) { pendingDeleteId = id; ui.confirmModal.hidden = false; requestAnimationFrame(()=>ui.confirmModal.classList.add('is-open')); }
    function closeDeleteConfirm() { ui.confirmModal.classList.remove('is-open'); pendingDeleteId = null; setTimeout(()=>{ ui.confirmModal.hidden = true; }, 200); }

    ui.templateGrid.addEventListener('click',(event)=>{const button=event.target.closest('[data-template-id]'); if(button) selectTemplate(button.dataset.templateId);});
    ui.homeGrid.addEventListener('click',(event)=>{ const del=event.target.closest('[data-home-delete]'); if(del){ openDeleteConfirm(del.dataset.homeDelete); return; } const scene=event.target.closest('[data-video-scene]');if(scene){openVideoScene(scene.dataset.videoScene,scene.dataset.sceneTitle);return;}const card=event.target.closest('[data-home-id]'); if(card) openHome(card.dataset.homeId); });
    ui.confirmModal.addEventListener('click',(event)=>{ if(event.target.closest('[data-confirm-close]')){ closeDeleteConfirm(); return; } if(event.target.closest('#confirmOk')){ const id=pendingDeleteId; closeDeleteConfirm(); if(id){ homeSceneService.deleteHome(id); renderSavedHomes(); renderVideoScenes(); tell('已删除这个家'); } } });
    ui.drawingInput.addEventListener('change',()=>{const file=ui.drawingInput.files[0]; if (!file) return; if (!['image/png','image/jpeg','image/webp'].includes(file.type)) { state.drawingFile=null; ui.uploadName.textContent='请上传 PNG、JPG 或 WEBP 图片'; return; } state.selectedTemplateId=null; state.drawingFile=file; ui.uploadName.textContent=`${file.name} · ${(file.size/1024/1024).toFixed(1)} MB`; ui.setupError.textContent=''; renderTemplates(); });
    ui.generateButton.addEventListener('click',startGeneration); ui.backToSetup.addEventListener('click',returnToSetup); ui.retryButton.addEventListener('click',startGeneration);
    ui.editorHomeName.addEventListener('change',()=>{ if(!state.project) return; const name=ui.editorHomeName.value.trim(); if(!name){ ui.editorHomeName.value=state.project.name; return; } state.project.name=name; ui.editorHomeName.value=name; if(state.project.source?.type==='video_rebuild'){localStorage.setItem(sceneNameKey(state.project.source.videoId),name);renderVideoScenes();tell('房间名称已更新');return;} saveSoon(); tell('家的名称已更新'); });
    ui.editorHomeName.addEventListener('keydown',(event)=>{ if(event.key==='Enter'){ event.preventDefault(); ui.editorHomeName.blur(); } });
    ui.drawerToggle.addEventListener('click',()=>{state.drawerExpanded=!state.drawerExpanded; renderAssetDrawer();}); ui.drawerModes?.addEventListener('click',(event)=>{const button=event.target.closest('[data-drawer-mode]');if(!button)return;state.drawerMode=button.dataset.drawerMode;state.activeAssetCategory='全部';renderAssetDrawer();}); ui.categoryTabs.addEventListener('click',(event)=>{const button=event.target.closest('[data-category]');if(!button)return;state.activeAssetCategory=button.dataset.category;renderAssetDrawer();}); ui.assetRail.addEventListener('click',(event)=>{const floor=event.target.closest('[data-floor-preset]');if(floor){sceneRuntime?.applyFloorPreset(floor.dataset.floorPreset);return;}const wallColor=event.target.closest('[data-wall-color]');if(wallColor){sceneRuntime?.applyWallColor(wallColor.dataset.wallColor);return;}const windowStyle=event.target.closest('[data-window-style]');if(windowStyle){sceneRuntime?.applyWindowStyle(windowStyle.dataset.windowStyle);return;}const asset=event.target.closest('[data-asset-id]');if(asset)sceneRuntime?.beginPlacement(asset.dataset.assetId);});
    let resetViewClickTimer=null;
    ui.resetViewButton.addEventListener('click',()=>{clearTimeout(resetViewClickTimer);resetViewClickTimer=setTimeout(()=>{sceneRuntime?.resetView();tell('已回到默认视角');},240);});
    ui.resetViewButton.addEventListener('dblclick',(event)=>{event.preventDefault();clearTimeout(resetViewClickTimer);resetViewClickTimer=null;sceneRuntime?.topView();});
    ui.transformConfirm.addEventListener('click',()=>sceneRuntime?.confirmTransform()); ui.transformDelete.addEventListener('click',deleteSelected);
    ui.daylightButton.addEventListener('click',()=>{ if(!state.project||state.project.source?.type==='video_rebuild') return; const next = state.project.daylight === 'night' ? 'day' : 'night'; state.project.daylight = next; ui.daylightButton.textContent = next === 'night' ? '🌙' : '☀'; saveSoon(); tell(next === 'night' ? '已切换到黑夜' : '已切换到白天'); }); ui.realTimeSlider.addEventListener('input',()=>applyRealTimeProgress(ui.realTimeSlider.value));ui.realTimeSlider.addEventListener('change',()=>applyRealTimeProgress(ui.realTimeSlider.value,true)); ui.rotateLeft.addEventListener('click',()=>rotateSelected(-1)); ui.rotateRight.addEventListener('click',()=>rotateSelected(1)); ui.scaleDown.addEventListener('click',()=>scaleSelected(1/1.15)); ui.scaleUp.addEventListener('click',()=>scaleSelected(1.15)); ui.moveSelected.addEventListener('click',()=> sceneRuntime?.beginMove()); ui.deleteSelected.addEventListener('click',deleteSelected);
    ui.editorBack.addEventListener('click',returnToSetup); ui.shareButton.addEventListener('click',openShareSheet); ui.shareSheet.addEventListener('click',(event)=>{ if(event.target.closest('[data-share-close]')){ closeShareSheet(); return; } const target=event.target.closest('[data-share]'); if(target){ closeShareSheet(); tell(`已唤起分享 · ${target.querySelector('b')?.textContent || ''}`); } });
    document.addEventListener('keydown',(event)=>{if(event.key==='Escape' && state.interaction.mode!=='orbit') exitInteraction();}); window.addEventListener('beforeunload',disposeScene);
    state.phase='setup';renderTemplates();renderSavedHomes();renderVideoScenes();updatePhases();
    if(new URLSearchParams(location.search).get('focus')==='templates'){requestAnimationFrame(()=>requestAnimationFrame(()=>{document.getElementById('templateBox')?.scrollIntoView({block:'center'});history.replaceState(null,'',location.pathname);}));}
  </script>
</body>
</html>
