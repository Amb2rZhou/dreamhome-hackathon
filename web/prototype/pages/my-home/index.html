      function beginPlacement(assetId) { state.interaction.mode='placing'; state.interaction.pendingAssetId=assetId; state.drawerExpanded=false; renderAssetDrawer(); controls.enabled=false; const ghost=createAssetGroup(assetId,true); ghost.name='placement-ghost'; ghost.visible=false; root.add(ghost); ui.placementHint.textContent=state.selectedRoomId ? '点按当前房间地面放入组件' : '点按任意房间地面放入组件'; ui.placementHint.classList.add('is-visible'); tell('选择一个房间地面摆放'); }
      function beginMove() { if (!state.selectedPlacementId) return; state.interaction.mode='moving'; controls.enabled=false; ui.placementHint.textContent='拖动组件到合适的位置'; ui.placementHint.classList.add('is-visible'); }
      function beginWindowMove() { if (!state.selectedWindowSlotId) return; const slot=project.windowSlots.find((item)=>item.id===state.selectedWindowSlotId); if (!slot) return; state.interaction.mode='moving-window'; controls.enabled=false; clearSlotHighlights(); project.windowSlots.filter((candidate)=>candidate.id!==slot.id && !candidate.occupied && candidate.roomId===slot.roomId).forEach((candidate)=>{ const marker=new THREE.Mesh(new THREE.CircleGeometry(.23,24),new THREE.MeshBasicMaterial({color:'#ff9a55',transparent:true,opacity:.9,side:THREE.DoubleSide})); marker.rotation.x=-Math.PI/2; marker.position.set(candidate.position.x,.02,candidate.position.z); marker.userData.slotId=candidate.id; root.add(marker); groups.highlightedSlots.push(marker); }); ui.placementHint.textContent='选择高亮的窗位'; ui.placementHint.classList.add('is-visible'); }
      function clearSlotHighlights() { groups.highlightedSlots.forEach((item)=>root.remove(item)); groups.highlightedSlots=[]; ui.placementHint.classList.remove('is-visible'); }
      function focusRoom(id) { state.selectedRoomId=id || null; renderRooms(); applyRoomFocus(); resetView(); }
      function applyRoomFocus() { groups.rooms.forEach((group,roomId)=>{ const emphasis=!state.selectedRoomId || roomId===state.selectedRoomId; group.traverse((object)=>{ if (object.material?.transparent !== undefined && object.userData.baseOpacity !== undefined) { object.material.transparent=!emphasis; object.material.opacity=emphasis?object.userData.baseOpacity:Math.min(object.userData.baseOpacity,.22); object.material.needsUpdate=true; } }); }); applyFinishesToGroups(project,groups); }
      function resetView() { const room=state.selectedRoomId ? findRoom(state.selectedRoomId) : null; const target=room ? new THREE.Vector3(room.x,0,room.z) : new THREE.Vector3(0,0,0); const distance=room ? Math.max(room.width,room.depth)*1.8+3 : 17; controls.target.copy(target); camera.position.copy(target).add(new THREE.Vector3(distance*.72,distance*.82,distance*.78)); controls.update(); }
      function dispose() { disposed=true; cancelAnimationFrame(frame); observer.disconnect(); renderer.domElement.removeEventListener('pointerdown',pointerDown); renderer.domElement.removeEventListener('pointermove',pointerMove); renderer.domElement.removeEventListener('pointerup',pointerUp); controls.dispose(); root.traverse((object)=>{ object.geometry?.dispose?.(); if (Array.isArray(object.material)) object.material.forEach((material)=>material.dispose?.()); else object.material?.dispose?.(); }); renderer.dispose(); renderer.domElement.remove(); }
      renderer.domElement.addEventListener('pointerdown',pointerDown); renderer.domElement.addEventListener('pointermove',pointerMove); renderer.domElement.addEventListener('pointerup',pointerUp); renderer.domElement.addEventListener('pointercancel',pointerUp); document.addEventListener('visibilitychange',()=>{ if (!document.hidden) renderer.render(scene,camera); });
      function applyFinishes() { applyFinishesToGroups(project,groups); }
      window.beginPlacement=beginPlacement; window.beginMove=beginMove; window.beginWindowMove=beginWindowMove; window.focusRoom=focusRoom; window.resetSceneView=resetView; window.clearSceneSelection=clearSelection; return {dispose,groups,root,controls,resetView,focusRoom,selectPlacement,selectWindow,clearSelection,beginPlacement,beginMove,beginWindowMove,applyFinishes};
    }

    function addRoom(root, room, index, groups) { const group=new THREE.Group(); group.userData.roomId=room.id; const floorColors={living:'#d8e6d2',dining:'#f3dfd6',bedroom:'#e9e2cf',kitchen:'#dce8e4',bathroom:'#e7e0ee','balcony-large':'#d4e9e3','balcony-small':'#d4e9e3',entry:'#eef0e6'}; const floorMaterial=new THREE.MeshStandardMaterial({color:floorColors[room.type] || '#d8e6d2',roughness:.82,metalness:0}); const defaultFloorMaterial={color:floorMaterial.color.getHex(),roughness:floorMaterial.roughness}; const floor=new THREE.Mesh(new THREE.BoxGeometry(room.width,.12,room.depth),floorMaterial); floor.position.set(room.x,-.06,room.z); floor.receiveShadow=true; floor.userData={roomId:room.id,defaultMaterial:defaultFloorMaterial}; group.add(floor); groups.floors.push(floor); const surfaceMaterial=new THREE.MeshStandardMaterial({color:'#b9c9b3',roughness:.8,metalness:0}); const surface=new THREE.Mesh(new THREE.BoxGeometry(room.width+.06,.06,room.depth+.06),surfaceMaterial); surface.position.set(room.x,.02,room.z); surface.receiveShadow=true; surface.userData={roomId:room.id,defaultMaterial:{color:surfaceMaterial.color.getHex(),roughness:surfaceMaterial.roughness}}; group.add(surface); groups.floors.push(surface); root.add(group); groups.rooms.set(room.id,group); }
    function applyFinishesToGroups(project, groups) {
      const floorAsset=project.finishes?.floorAssetId ? getAsset(project.finishes.floorAssetId) : null;
      const wallpaperAsset=project.finishes?.wallpaperAssetId ? getAsset(project.finishes.wallpaperAssetId) : null;
      groups.floors.forEach((mesh)=>{ const material=mesh.material; const fallback=mesh.userData.defaultMaterial; const active=floorAsset?.kind==='floor'?floorAsset:null; material.map=active?getFinishTexture(active,'floor'):null; material.color.set(active?'#ffffff':fallback.color); material.roughness=active?.finish?.roughness ?? (active?.kind==='floor' ? .7 : fallback.roughness); material.metalness=0; if (material.map) { const repeat=Math.max(mesh.geometry.parameters.width,mesh.geometry.parameters.depth)/FINISH_TEXTURE_CONFIG.floor.unit; material.map.repeat.set(repeat,repeat); material.map.needsUpdate=true; } material.needsUpdate=true; });
      groups.walls.forEach((mesh)=>{ const material=mesh.material; const fallback=mesh.userData.defaultMaterial; const active=wallpaperAsset?.kind==='wallpaper'?wallpaperAsset:null; material.map=active?getFinishTexture(active,'wallpaper'):null; material.color.set(active?'#ffffff':fallback.color); material.roughness=active?.finish?.roughness ?? (active?.kind==='wallpaper' ? .78 : fallback.roughness); material.transparent=Boolean(state.selectedRoomId && mesh.userData.roomId && mesh.userData.roomId!==state.selectedRoomId); material.opacity=material.transparent?Math.min(fallback.opacity,.24):1; if (material.map) { const size=Math.max(mesh.geometry.parameters.width,mesh.geometry.parameters.height,mesh.geometry.parameters.depth); const repeat=Math.max(2,size/FINISH_TEXTURE_CONFIG.wallpaper.unit); material.map.repeat.set(repeat,repeat); material.map.needsUpdate=true; } material.needsUpdate=true; });
    }
    function applyProjectFinish(kind, assetId) {
      const asset=getAsset(assetId); const field=kind==='floor' ? 'floorAssetId' : 'wallpaperAssetId';
      if (!asset || asset.kind!==kind || !getFavorites().has(assetId) || !state.project) return;
      exitInteraction(); state.project.finishes={...(state.project.finishes || {}),[field]:assetId}; sceneRuntime?.applyFinishes(); renderAssetDrawer(); saveSoon(); tell(`已应用${asset.name}${kind==='floor'?'地板':'墙纸'}`);
    }
    function addWalls(root, project, groups) {
      const wallHeight=2.6, wallThickness=.1, material=()=>new THREE.MeshStandardMaterial({color:'#eff5ed',roughness:.9,transparent:false,opacity:1,side:THREE.DoubleSide});
      project.walls.forEach((segment)=>{ const length=segment.to-segment.from; if (length<=0) return; const horizontal=segment.axis==='x'; const mesh=new THREE.Mesh(new THREE.BoxGeometry(horizontal?length:wallThickness,wallHeight,horizontal?wallThickness:length),material()); mesh.position.set(horizontal?(segment.from+segment.to)/2:segment.at,wallHeight/2,horizontal?segment.at:(segment.from+segment.to)/2); mesh.castShadow=true; mesh.receiveShadow=true; mesh.userData={baseOpacity:1,wallId:segment.id,wallRole:segment.role,defaultMaterial:{color:mesh.material.color.getHex(),roughness:mesh.material.roughness,opacity:mesh.material.opacity}}; root.add(mesh); groups.walls.push(mesh); });
    }
    function addWindow(root, slot, groups) { const frame=new THREE.Group(); frame.userData.slotId=slot.id; frame.name=`window-${slot.id}`; const p=slot.position; frame.position.set(p.x,p.y,p.z); frame.rotation.y=p.rotationY; const outer=new THREE.Mesh(new THREE.BoxGeometry(1.22,1.05,.11),new THREE.MeshStandardMaterial({color:'#f9fbf8',roughness:.35,metalness:.05})); const glass=new THREE.Mesh(new THREE.BoxGeometry(1.04,.87,.13),new THREE.MeshStandardMaterial({color:'#bde2e4',transparent:true,opacity:.62,roughness:.15,metalness:.15})); const crossA=new THREE.Mesh(new THREE.BoxGeometry(.045,.9,.15),new THREE.MeshStandardMaterial({color:'#e7eee5'})); const crossB=new THREE.Mesh(new THREE.BoxGeometry(1.06,.045,.15),new THREE.MeshStandardMaterial({color:'#e7eee5'})); frame.add(outer,glass,crossA,crossB); frame.visible=slot.occupied; root.add(frame); groups.windows.set(slot.id,frame); }
    function assetFootprint(assetId) { const asset=resolveAsset(assetId); return Math.max(asset.dimensions?.[0] || .7,asset.dimensions?.[2] || .7); }
    function createAssetGroup(assetId, ghost=false) { const asset=resolveAsset(assetId); const group=new THREE.Group(); const baseMaterial=(color)=>new THREE.MeshStandardMaterial({color,roughness:.72,transparent:ghost,opacity: ghost ? .55 : 1}); const wood=baseMaterial(asset?.accent || '#a27b5b'); const dark=baseMaterial('#59645b'); const addBox=(w,h,d,x,y,z,material=wood)=>{const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),material);mesh.position.set(x,y,z);mesh.castShadow=true;mesh.receiveShadow=true;group.add(mesh);return mesh;}; const addCylinder=(r1,r2,h,x,y,z,material=wood)=>{const mesh=new THREE.Mesh(new THREE.CylinderGeometry(r1,r2,h,16),material);mesh.position.set(x,y,z);mesh.castShadow=true;group.add(mesh);return mesh;};
      const primitive=asset.primitive || '';
      if (primitive==='chair') { addBox(.72,.16,.68,0,.52,0); addBox(.7,.72,.15,0,.93,.26,baseMaterial(asset.color || '#d7a98b')); [-.27,.27].forEach((x)=>[-.22,.22].forEach((z)=>addBox(.07,.5,.07,x,.25,z,dark))); }
      else if (primitive==='sofa') { addBox(1.6,.28,.72,0,.48,0); addBox(1.55,.6,.18,0,.83,.27,baseMaterial(asset.color || '#d7a98b')); addBox(.18,.5,.7,-.71,.68,0,baseMaterial(asset.color || '#c18b78')); addBox(.18,.5,.7,.71,.68,0,baseMaterial(asset.color || '#c18b78')); }
      else if (primitive==='lamp') { addCylinder(.24,.3,.07,0,.04,0,dark); addCylinder(.035,.035,1.1,0,.58,0,dark); addCylinder(.31,.2,.32,0,1.28,0,baseMaterial(asset.color || '#efd981')); }
      else if (primitive==='cabinet') { addBox(.95,1.28,.32,0,.64,0,wood); [-.37,0,.37].forEach((y)=>addBox(.82,.05,.35,0,y+.28,0,dark)); }
      else if (primitive==='table') { addCylinder(.6,.6,.09,0,.64,0,wood); [-.36,.36].forEach((x)=>[-.36,.36].forEach((z)=>addBox(.08,.58,.08,x,.29,z,dark))); }
      else if (primitive==='bed') { addBox(1.35,.3,1.7,0,.32,0,wood); addBox(1.28,.17,1.45,0,.56,-.08,baseMaterial(asset.color || '#e2ddd0')); addBox(1.35,.48,.12,0,.55,.78,dark); }
      else { addCylinder(.22,.3,.32,0,.16,0,baseMaterial('#af8061')); [-.2,0,.2].forEach((x,i)=>{const leaf=new THREE.Mesh(new THREE.SphereGeometry(.22,12,8),baseMaterial(i===1?'#6f916b':'#86a87d'));leaf.scale.set(.65,1.45,.4);leaf.position.set(x,.65+(i%2)*.16,0);leaf.rotation.z=x*1.5;group.add(leaf);}); }
      return group; }
    function addPlacement(root, placement, groups) { const group=createAssetGroup(placement.assetId); group.name=`placement-${placement.id}`; group.userData.placementId=placement.id; group.position.set(placement.position.x,placement.position.y,placement.position.z); group.rotation.set(placement.rotation.x,placement.rotation.y,placement.rotation.z); group.scale.set(placement.scale.x,placement.scale.y,placement.scale.z); root.add(group); groups.placements.set(placement.id,group); groups.selectable.push(group); loadModelIfAvailable(placement,group); }
    function setSelectedLook(group, selected) { group.traverse((object)=>{ if (!object.isMesh) return; object.material.emissive?.set(selected ? '#607b5f' : '#000000'); object.material.emissiveIntensity=selected?.26:0; }); }
    function findPlacementGroup(object) { let current=object; while(current && !current.userData.placementId) current=current.parent; return current; }
    function findWindowGroup(object) { let current=object; while(current && !current.userData.slotId) current=current.parent; return current; }
    const gltfLoader = new GLTFLoader();
    function loadModelIfAvailable(placement, group) { const asset=resolveAsset(placement.assetId); if (!asset?.modelUrl) return; gltfLoader.load(asset.modelUrl,(gltf)=>{ const model=gltf.scene; const box=new THREE.Box3().setFromObject(model); const size=box.getSize(new THREE.Vector3()), center=box.getCenter(new THREE.Vector3()); const dims=asset.dimensions||[.7,.7,.7]; const scale=Math.max(dims[0],dims[1],dims[2])/(Math.max(size.x,size.y,size.z)||1); model.scale.setScalar(scale); model.position.set(-center.x*scale,-box.min.y*scale,-center.z*scale); model.traverse((node)=>{ if (node.isMesh) { node.castShadow=true; node.receiveShadow=true; } }); group.clear(); group.add(model); },undefined,()=>{}); }
    function disposeScene() { if (sceneRuntime) { sceneRuntime.dispose(); sceneRuntime=null; } }
    function syncInspector() { if (!sceneRuntime) return; const placement=state.selectedPlacementId && state.project.placements.find((item)=>item.id===state.selectedPlacementId); const slot=state.selectedWindowSlotId && state.project.windowSlots.find((item)=>item.id===state.selectedWindowSlotId); const active=placement||slot; ui.inspector.classList.toggle('is-visible',Boolean(active)); ui.placementHint.classList.toggle('is-visible',['placing','moving','moving-window'].includes(state.interaction.mode)); if (!active) return; if (placement) { const asset=resolveAsset(placement.assetId); ui.inspectorTitle.textContent=asset.name; ui.inspectorCopy.textContent='已选中 · 可拖动摆放'; ui.rotateLeft.hidden=false; ui.rotateRight.hidden=false; ui.moveSelected.hidden=false; ui.deleteSelected.hidden=false; } else { ui.inspectorTitle.textContent='窗户'; ui.inspectorCopy.textContent='可移动到当前房间的空闲墙面'; ui.rotateLeft.hidden=true; ui.rotateRight.hidden=true; ui.moveSelected.hidden=false; ui.moveSelected.textContent='↔'; ui.moveSelected.setAttribute('aria-label','移动窗户'); ui.deleteSelected.hidden=true; } }
    window.syncInspector=syncInspector;
    function clearSelection() { sceneRuntime?.clearSelection(); }
    function selectRoom(id) { sceneRuntime?.focusRoom(id); }
    function rotateSelected(direction) { const placement=state.project.placements.find((item)=>item.id===state.selectedPlacementId); if (!placement) return; placement.rotation.y += direction*Math.PI/12; const group=sceneRuntime.groups.placements.get(placement.id); group.rotation.y=placement.rotation.y; tell('已旋转 15°'); saveSoon(); }
    function deleteSelected() { const id=state.selectedPlacementId; if (!id) return; const group=sceneRuntime.groups.placements.get(id); if (group) { group.parent.remove(group); sceneRuntime.groups.placements.delete(id); sceneRuntime.groups.selectable=sceneRuntime.groups.selectable.filter((item)=>item!==group); } state.project.placements=state.project.placements.filter((item)=>item.id!==id); state.selectedPlacementId=null; syncInspector(); tell('组件已移除'); saveSoon(); }
    function exitInteraction() { if (!sceneRuntime) return; if (state.interaction.mode === 'placing') { const ghost=sceneRuntime.root.getObjectByName('placement-ghost'); if (ghost) sceneRuntime.root.remove(ghost); } state.interaction.mode='orbit'; state.interaction.pendingAssetId=null; sceneRuntime.controls.enabled=true; ui.placementHint.classList.remove('is-visible'); tell('已取消当前操作'); }

    ui.templateGrid.addEventListener('click',(event)=>{const button=event.target.closest('[data-template-id]'); if(button) selectTemplate(button.dataset.templateId);});
    ui.drawingInput.addEventListener('change',()=>{const file=ui.drawingInput.files[0]; if (!file) return; if (!['image/png','image/jpeg','image/webp'].includes(file.type)) { state.drawingFile=null; ui.uploadName.textContent='请上传 PNG、JPG 或 WEBP 图片'; return; } state.selectedTemplateId=null; state.drawingFile=file; ui.uploadName.textContent=`${file.name} · ${(file.size/1024/1024).toFixed(1)} MB`; ui.setupError.textContent=''; renderTemplates(); });
    ui.generateButton.addEventListener('click',startGeneration); ui.backToSetup.addEventListener('click',returnToSetup); ui.retryButton.addEventListener('click',startGeneration);
    ui.drawerToggle.addEventListener('click',()=>{state.drawerExpanded=!state.drawerExpanded; renderAssetDrawer();}); ui.drawerModes?.addEventListener('click',(event)=>{const button=event.target.closest('[data-drawer-mode]');if(!button)return;state.drawerMode=button.dataset.drawerMode;state.activeAssetCategory='全部';renderAssetDrawer();}); ui.categoryTabs.addEventListener('click',(event)=>{const button=event.target.closest('[data-category]');if(!button)return;state.activeAssetCategory=button.dataset.category;renderAssetDrawer();}); ui.assetRail.addEventListener('click',(event)=>{const finish=event.target.closest('[data-finish-id]');if(finish){applyProjectFinish(finish.dataset.finishKind,finish.dataset.finishId);return;}const asset=event.target.closest('[data-asset-id]');if(asset)sceneRuntime?.beginPlacement(asset.dataset.assetId);});
    ui.roomSelector.addEventListener('click',(event)=>{const button=event.target.closest('[data-room-id]');if(button)selectRoom(button.dataset.roomId);}); ui.resetViewButton.addEventListener('click',()=>sceneRuntime?.resetView()); ui.rotateLeft.addEventListener('click',()=>rotateSelected(-1)); ui.rotateRight.addEventListener('click',()=>rotateSelected(1)); ui.moveSelected.addEventListener('click',()=> state.selectedWindowSlotId ? sceneRuntime?.beginWindowMove() : sceneRuntime?.beginMove()); ui.deleteSelected.addEventListener('click',deleteSelected);
    ui.clearHomeButton.addEventListener('click',()=>{ if (!confirm('重新选择户型会清除当前摆放，确定继续吗？')) return; localStorage.removeItem(STORAGE_KEY); disposeScene(); state.project=null; state.selectedRoomId=null; state.selectedPlacementId=null; state.selectedWindowSlotId=null; state.phase='setup'; updatePhases(); tell('已返回户型选择'); });
    document.addEventListener('keydown',(event)=>{if(event.key==='Escape' && state.interaction.mode!=='orbit') exitInteraction();}); window.addEventListener('beforeunload',disposeScene);
    const existing=homeSceneService.loadProject(); if (existing) { state.project=existing; state.phase='editor'; updatePhases(); initEditor(); } else { renderTemplates(); updatePhases(); }
  </script>
