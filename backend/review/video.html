<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>暂停识别演示</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
  body { font-family: -apple-system, "PingFang SC", sans-serif; margin: 0; background: #111; color: #eee; display: flex; height: 100vh; }
  #stage { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
  video { max-width: 100%; max-height: 100vh; }
  #overlay { position: absolute; pointer-events: none; }
  .marker { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer;
            display: flex; align-items: center; gap: 7px; }
  .marker .dot { width: 14px; height: 14px; border-radius: 50%; background: #fff; flex: none;
                 box-shadow: 0 0 0 4px rgba(255,255,255,.35); animation: breathe 1.8s ease-in-out infinite; }
  .marker .pill { background: rgba(0,0,0,.72); backdrop-filter: blur(6px); color: #fff; font-size: 13px;
                  padding: 4px 11px; border-radius: 999px; white-space: nowrap; }
  @keyframes breathe { 0%,100% { box-shadow: 0 0 0 4px rgba(255,255,255,.35);}
                       50% { box-shadow: 0 0 0 9px rgba(255,255,255,.12);} }
  #hint { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.55);
          padding: 6px 14px; border-radius: 999px; font-size: 13px; }
  #panel { width: 340px; background: #1b1b1f; padding: 16px; display: none; flex-direction: column; gap: 8px; }
  #panel model-viewer { width: 100%; height: 300px; background: #26262c; border-radius: 12px; }
  #panel h3 { margin: 4px 0 0; font-size: 16px; }
  #panel .tags { font-size: 12px; color: #aaa; line-height: 1.8; }
  #panel .tag2 { background: #2c2c33; border-radius: 4px; padding: 1px 7px; margin-right: 4px; display: inline-block; }
  #panel .close { align-self: flex-end; background: none; border: 0; color: #888; font-size: 20px; cursor: pointer; }
  #panel .empty { color: #999; font-size: 13px; line-height: 1.7; }
</style>
</head>
<body>
<div id="stage">
  <video id="v" controls playsinline></video>
  <div id="overlay"></div>
  <div id="hint">▶️ 播放中 · 任意时刻暂停试试</div>
</div>
<div id="panel">
  <button class="close" onclick="panel.style.display='none'">✕</button>
  <div id="panel-body"></div>
</div>
<script>
const qs = new URLSearchParams(location.search);
const v = document.getElementById('v'), overlay = document.getElementById('overlay');
const hint = document.getElementById('hint'), panel = document.getElementById('panel');
let tracks = [], assets = {}, videoId = '', liveBoxes = null, liveSeq = 0;

async function init() {
  const vids = await (await fetch('/api/videos')).json();
  const vid = qs.get('video_id') || (vids.find(x => x.status === 'indexed' && x.play_url.includes('/storage/')) || vids[0]).video_id;
  videoId = vid;
  const meta = vids.find(x => x.video_id === vid);
  v.src = meta.play_url;
  v.crossOrigin = 'anonymous';
  const idx = await (await fetch(`/api/videos/${vid}/index`)).json();
  tracks = idx.tracks;
  for (const a of await (await fetch('/api/assets?include_all_status=true')).json()) assets[a.asset_id] = a;
  document.title = `暂停识别 · ${meta.title}`;
  // 溯源直达:?t=秒&asset_id=xx → 定位到该时刻暂停,光点亮起并自动打开该资产面板
  const t0 = parseFloat(qs.get('t'));
  if (!isNaN(t0)) v.addEventListener('loadedmetadata', () => {
    v.currentTime = Math.max(0, t0);
    v.pause();
    const aid = qs.get('asset_id');
    if (aid) setTimeout(() => {
      const tr = tracks.find(x => x.asset_id === aid) || tracks.find(x => assets[x.asset_id]);
      if (tr) showPanel(tr);
    }, 600);
  }, { once: true });
}

function iou(a, b) {
  const ix = Math.max(0, Math.min(a[0]+a[2], b[0]+b[2]) - Math.max(a[0], b[0]));
  const iy = Math.max(0, Math.min(a[1]+a[3], b[1]+b[3]) - Math.max(a[1], b[1]));
  const inter = ix * iy;
  return inter / (a[2]*a[3] + b[2]*b[3] - inter || 1);
}
function bboxAt(tr, t) {
  const fs = tr.frames;
  if (!fs.length || t < tr.t_start - 0.2 || t > tr.t_end + 0.2) return null;
  let lo = 0, hi = fs.length - 1;
  while (lo < hi) { const m = (lo + hi) >> 1; fs[m].t < t ? lo = m + 1 : hi = m; }
  const b = fs[lo], a = fs[Math.max(0, lo - 1)];
  if (Math.abs(b.t - t) > 0.2 && Math.abs(a.t - t) > 0.2) return null;
  if (a === b || b.t === a.t) return b.bbox;
  // 镜头快移时相邻帧框跳变大,插值会把光点"平均"到空中 → 跳变大就吸附最近真实帧
  if (iou(a.bbox, b.bbox) < 0.3)
    return (Math.abs(a.t - t) <= Math.abs(b.t - t)) ? a.bbox : b.bbox;
  const p = Math.min(1, Math.max(0, (t - a.t) / (b.t - a.t)));
  return a.bbox.map((x, i) => x + (b.bbox[i] - x) * p);
}

function showBoxes() {
  overlay.innerHTML = '';
  const W = v.clientWidth, H = v.clientHeight;
  const vr = v.videoWidth / v.videoHeight, er = W / H;
  const dw = vr > er ? W : H * vr, dh = vr > er ? W / vr : H;
  const ox = (W - dw) / 2, oy = (H - dh) / 2;
  overlay.style.width = W + 'px'; overlay.style.height = H + 'px';
  const t = v.currentTime;
  let n = 0;
  const placed = [];
  // 实时校正结果优先:live 框已带 asset_id,位置像素级精确
  const liveByAsset = {};
  if (liveBoxes) for (const b of liveBoxes) if (b.asset_id) liveByAsset[b.asset_id] = b.bbox;
  // 轨迹长的优先占位;两个光点几乎重合时只留一个(残余的重复检出防撞)
  const byLen = [...tracks].sort((x, y) => (y.t_end - y.t_start) - (x.t_end - x.t_start));
  const showAll = qs.get('all') === '1';   // 预审模式:未生成的也显示(空心点+品类)
  for (const tr of byLen) {
    const ready = tr.asset_id && assets[tr.asset_id] && assets[tr.asset_id].status === 'ready';
    if (!ready && !showAll) continue;      // 正常模式只标已审核通过的资产
    const bb = (ready && liveByAsset[tr.asset_id]) || bboxAt(tr, t);
    if (!bb) continue;
    const cx = bb[0] + bb[2] / 2, cy = bb[1] + bb[3] / 2;
    if (placed.some(p => Math.hypot(p[0] - cx, p[1] - cy) < 0.06)) continue;
    placed.push([cx, cy]);
    if (ready) n++;
    const el = document.createElement('div');
    el.className = 'marker';
    el.style.cssText = `left:${ox + cx*dw}px; top:${oy + cy*dh}px;` +
                       (ready && liveByAsset[tr.asset_id] ? '' : 'opacity:.75;');
    const label = ready ? assets[tr.asset_id].name : tr.category + '·未生成';
    const dotStyle = ready ? '' : 'background:transparent;border:2.5px solid #fff;animation:none;';
    el.innerHTML = `<span class="dot" style="${dotStyle}"></span><span class="pill">${label}</span>`;
    el.onclick = () => showPanel(tr);
    overlay.appendChild(el);
  }
  const tag = liveBoxes ? '(已校准)' : '';
  hint.textContent = n ? `⏸ ${n} 件同款可看 3D ${tag} · 也可以圈选其他物品` : `⏸ 圈选任意家具,生成它的 3D 同款`;
}

function showPanel(tr) {
  const body = document.getElementById('panel-body');
  const a = tr.asset_id && assets[tr.asset_id];
  if (a) {
    const l = a.labels, tags = [l.sub, ...(l.colors||[]), ...(l.materials||[]), ...(l.styles||[]), ...(l.features||[])].filter(Boolean);
    body.innerHTML = `<model-viewer src="${a.glb_url}" camera-controls auto-rotate shadow-intensity="1" poster="${a.thumb_url}"></model-viewer>
      <h3>${a.name}</h3>
      <div class="tags">${tags.map(x => `<span class="tag2">${x}</span>`).join('')}</div>
      <div class="tags">来源 @ ${a.source.t_best}s · 从本视频自动生成</div>`;
  } else {
    body.innerHTML = `<div class="empty">这件「${tr.category}」还没生成 3D 资产。<br><br>
      在正式 App 里,圈选它就会触发生成(约 40 秒),生成后所有用户共享这件资产。</div>`;
  }
  panel.style.display = 'flex';
}

async function refineLive() {
  // 暂停帧截图 → 实时检测(dry,不写索引) → 光点吸附到精确位置
  const seq = ++liveSeq, t = v.currentTime;
  try {
    const c = document.createElement('canvas');
    const scale = Math.min(1, 720 / v.videoWidth);
    c.width = v.videoWidth * scale; c.height = v.videoHeight * scale;
    c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
    const uri = c.toDataURL('image/jpeg', 0.8);
    const r = await fetch(`/api/videos/${videoId}/detect`, {
      method: 'POST', headers: {'content-type': 'application/json'},
      body: JSON.stringify({t, frame_data_uri: uri, dry: true})});
    if (!r.ok) return;
    const data = await r.json();
    if (seq !== liveSeq || !v.paused || Math.abs(v.currentTime - t) > 0.05) return;  // 已经跳走了
    liveBoxes = data.boxes;
    showBoxes();
  } catch (e) { /* 校正失败就用索引位置,不打扰 */ }
}

function onPause() { liveBoxes = null; showBoxes(); refineLive(); }
v.addEventListener('pause', onPause);
v.addEventListener('seeked', () => { if (v.paused) onPause(); });
v.addEventListener('play', () => { liveBoxes = null; liveSeq++; overlay.innerHTML = ''; panel.style.display = 'none'; hint.textContent = '▶️ 播放中 · 任意时刻暂停试试'; });
window.addEventListener('resize', () => { if (v.paused) showBoxes(); });
init();
</script>
</body>
</html>
